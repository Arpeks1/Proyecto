<button id="boton-modo-oscuro">🌙</button>

<button id="boton-orkonatra">
    <img src="../src/iconos/orkonatra.png" alt="ORKONATRA">
</button>

<audio id="orkAudio">
    <source src="../src/audios/40K Ork - What A Wonderful WAAAGH!.mp3" type="audio/mpeg">
</audio>

<script>

    const botonModo = document.getElementById("boton-modo-oscuro");

if (localStorage.getItem("modoOscuro") === "activado") {
    document.documentElement.classList.add("modo-oscuro");
    botonModo.textContent = "☀️";
}

botonModo.addEventListener("click", () => {

    document.documentElement.classList.toggle("modo-oscuro");

    if (document.documentElement.classList.contains("modo-oscuro")) {
        localStorage.setItem("modoOscuro", "activado");
        botonModo.textContent = "☀️";
    } else {
        localStorage.setItem("modoOscuro", "desactivado");
        botonModo.textContent = "🌙";
    }

});

const botonOrk=document.getElementById("boton-orkonatra");
const audioOrk=document.getElementById("orkAudio");

let sonando=false;

botonOrk.addEventListener("click",()=>{

    if(!sonando){

        audioOrk.play();
        sonando=true;

    }else{

        audioOrk.pause();
        audioOrk.currentTime=0;
        sonando=false;

    }

});

audioOrk.addEventListener("ended",()=>{

    sonando=false;

});

</script>
<script>
    // Lógica para alternar pestañas entre Iniciar Sesión y Registro
        const btnRegistro = document.getElementById('Form-Registro');
        const btnInicio = document.getElementById('Form-Inicio');
        const formRegistro = document.getElementById('Formulario-Registro');
        const formInicio = document.getElementById('Formulario-Inicio');

        btnRegistro.addEventListener('click', () => {
            btnRegistro.classList.add('activo'); btnInicio.classList.remove('activo');
            formRegistro.classList.add('activo'); formInicio.classList.remove('activo');
        });

        btnInicio.addEventListener('click', () => {
            btnInicio.classList.add('activo'); btnRegistro.classList.remove('activo');
            formInicio.classList.add('activo'); formRegistro.classList.remove('activo');
        });
</script>
